<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Himalaya - Under Construction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
        }

        .container{
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        h2{
            color:#ffd54f;
            margin-bottom:20px;
            font-weight:normal;
        }

        p{
            font-size:1.1rem;
            line-height:1.8;
            color:#e5e7eb;
        }

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        .footer{
            margin-top:40px;
            font-size:14px;
            color:#cbd5e1;
        }

        @media(max-width:600px){
            h1{
                font-size:2.2rem;
            }

            p{
                font-size:1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="icon">🚧</div>

    <h1>South Himalaya</h1>

    <h2>Website Under Construction</h2>

    <p>
        We're working hard to build something amazing.
        Our new website will be launching soon.
    </p>

    <p style="margin-top:20px;">
        Thank you for your patience and support.
    </p>

    <div class="footer">
        &copy; 2026 South Himalaya. All Rights Reserved.
    </div>

</div>

</body>
</html>
