<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Himalaya - Under Construction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg, #0f172a, #1e3a8a, #25eb36);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            overflow:hidden;
        }

        .container{
            max-width:700px;
            padding:40px;
        }

        .logo{
            margin-bottom:30px;
            animation:float 3s ease-in-out infinite;
        }

        .logo img{
            width:180px;
            max-width:80%;
            height:auto;
            display:block;
            margin:0 auto;
            filter:drop-shadow(0 10px 25px rgba(0,0,0,.35));
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
            font-weight:700;
        }

        h2{
            color:#FFD54F;
            margin-bottom:25px;
            font-weight:400;
        }

        p{
            font-size:1.1rem;
            line-height:1.8;
            color:#e5e7eb;
        }

        .footer{
            margin-top:40px;
            font-size:14px;
            color:#cbd5e1;
        }

        @keyframes float{
            0%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(0);
            }
        }

        @media(max-width:768px){

            .logo img{
                width:140px;
            }

            h1{
                font-size:2.2rem;
            }

            h2{
                font-size:1.3rem;
            }

            p{
                font-size:1rem;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="South Himalaya Logo">
    </div>

    <h2>🚧 Website Under Construction 🚧</h2>

    <p>
        We're working hard to create a better experience for you.
        Our new website will be launching soon.
    </p>

    <p style="margin-top:20px;">
        Thank you for your patience and support.
    </p>

    <div class="footer">
        &copy; 2026 South Himalaya. All Rights Reserved.
    </div>

</div>

</body>
</html>
